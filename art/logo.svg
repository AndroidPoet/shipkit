<svg width="1200" height="400" viewBox="0 0 1200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="1200" height="400" fill="#F8F9FA"/>
  <!-- Top accent bar -->
  <rect width="1200" height="4" fill="url(#grad)" />
  <defs>
    <linearGradient id="grad" x1="0" y1="0" x2="1200" y2="0">
      <stop offset="0%" stop-color="#0969DA"/>
      <stop offset="50%" stop-color="#8250DF"/>
      <stop offset="100%" stop-color="#CF222E"/>
    </linearGradient>
  </defs>
  <!-- Ship/rocket icon representation -->
  <g transform="translate(600, 130)">
    <!-- Rocket / Ship shape -->
    <path d="M0,-55 L18,-20 Q20,-10 20,0 L0,25 L-20,0 Q-20,-10 -18,-20 Z" fill="#0969DA" opacity="0.9"/>
    <path d="M-8,10 L8,10 L5,40 L-5,40 Z" fill="#CF222E" opacity="0.7"/>
    <!-- Flame -->
    <path d="M-5,40 Q0,55 5,40 Z" fill="#F5A623" opacity="0.8"/>
  </g>
  <!-- Title -->
  <text x="600" y="225" text-anchor="middle" fill="#1F2328" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="700" letter-spacing="-1">Shipkit</text>
  <!-- Subtitle -->
  <text x="600" y="265" text-anchor="middle" fill="#656D76" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" letter-spacing="0.3">The release cockpit for mobile apps</text>
  <!-- Tagline -->
  <text x="600" y="300" text-anchor="middle" fill="#8250DF" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="500" letter-spacing="0.5">Google Play • App Store Connect • RevenueCat • CI</text>
</svg>
